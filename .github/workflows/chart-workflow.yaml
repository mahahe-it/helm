name: Lint, Test and Deploy Charts
on:
  push:
    branches:
      - main
    paths:
      - charts/**
      - .github/workflows/**
  pull_request_target:
    paths:
      - charts/**
      - .github/workflows/**

# Enforce least-privilege permissions globally
permissions:
  contents: read
  packages: read

jobs:
  lint-charts:
    name: Lint Charts
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target'
    steps:
      - name: "Checkout PR Code"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: "Set Up Helm"
        uses: azure/setup-helm@v5.0.0
        with:
          version: v3.19.5

      - name: "Set Up Python"
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: "Set up chart-testing"
        uses: helm/chart-testing-action@v2.8.0

      - name: "Run chart-testing (list-changed)"
        id: list-changed
        run: |
          changed=$(ct list-changed --config .github/ct/ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "changed-list=$changed" >> $GITHUB_OUTPUT
          fi

      - name: "Save Testing Values from Secret"
        if: contains(steps.list-changed.outputs.changed-list, 'charts/foundry-vtt')
        env:
          SECRET_VALUES: ${{ secrets.FOUNDRY_SECRET_VALUES }}
        run: echo "$SECRET_VALUES" | base64 -d > ./charts/foundry-vtt/ci/test-values.yaml

      - name: "Run chart-testing (lint)"
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config .github/ct/ct.yaml --lint-conf .github/ct/lintconf.yaml --chart-yaml-schema .github/ct/chart_schema.yaml

  install-charts:
    name: Install Charts
    runs-on: ubuntu-latest
    needs: lint-charts
    if: github.event_name == 'pull_request_target'
    steps:
      - name: "Checkout PR Code"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: "Set Up Helm"
        uses: azure/setup-helm@v5.0.0
        with:
          version: v3.19.5

      - name: "Set Up Python"
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: "Set up chart-testing"
        uses: helm/chart-testing-action@v2.8.0

      - name: "Run chart-testing (list-changed)"
        id: list-changed
        run: |
          changed=$(ct list-changed --config .github/ct/ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "changed-list=$changed" >> $GITHUB_OUTPUT
          fi

      - name: "Save Testing Values from Secret"
        if: contains(steps.list-changed.outputs.changed-list, 'charts/foundry-vtt')
        env:
          SECRET_VALUES: ${{ secrets.FOUNDRY_SECRET_VALUES }}
        run: echo "$SECRET_VALUES" | base64 -d > ./charts/foundry-vtt/ci/test-values.yaml

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1.14.0

      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --config .github/ct/ct.yaml --debug

  release-charts:
    name: Dual Release (OCI + HTTPS)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write   # To push to GHCR OCI
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: v3.19.5

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package & Push Changed Charts to OCI
        run: |
          # Detect changed charts
          changed_dirs=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }} | grep "^charts/" | cut -d '/' -f 1,2 | sort -u || true)
          
          if [[ -z "$changed_dirs" ]]; then
            echo "No chart directories changed."
            exit 0
          fi

          for chart in $changed_dirs; do
            [ -d "$chart" ] || continue
            echo "==> Processing $chart"
            CHART_NAME=$(basename "$chart")
            
            # Read the version already bumped by the developer in the PR
            CURRENT_VERSION=$(yq '.version' "$chart/Chart.yaml")
            echo "Publishing $CHART_NAME v$CURRENT_VERSION to OCI"

            # Package and Push to OCI natively
            helm package "$chart" -d /tmp/oci
            helm push "/tmp/oci/${CHART_NAME}-${CURRENT_VERSION}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/helm"
          done